{% extends 'base.html' %}

{% block title %}Registro de Usuario - Mundial 2026{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card card-custom p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-uppercase">Crea tu Cuenta Oficial</h2>
                <p class="text-muted">Asegurá tu lugar en la fiesta del fútbol más grande del mundo.</p>
            </div>

            <form action="/registro" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="regNombre" name="nombre" placeholder="Nombre" required>
                            <label for="regNombre">Nombre</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="regApellido" name="apellido" placeholder="Apellido" required>
                            <label for="regApellido">Apellido</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="regEmail" name="email" placeholder="correo@ejemplo.com" required>
                    <label for="regEmail"><i class="bi bi-envelope text-muted me-2"></i>Correo Electrónico</label>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="regPassword" name="password" placeholder="Contraseña" required>
                            <label for="regPassword"><i class="bi bi-lock text-muted me-2"></i>Contraseña</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="password" class="form-control" id="regPasswordConfirm" name="password_confirm" placeholder="Confirmar" required>
                            <label for="regPasswordConfirm">Confirmar Contraseña</label>
                        </div>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" value="" id="terminos" required>
                    <label class="form-check-input-label text-muted small" for="terminos">
                        Acepto los términos y condiciones de la FIFA para la adquisición de tickets oficiales.
                    </label>
                </div>

                <button type="submit" class="btn btn-mundial w-100 py-3 fs-5 shadow-sm">
                    Crear mi Perfil de Aficionado
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">¿Ya estás registrado? <a href="/login" class="text-success fw-bold text-decoration-none">Inicia Sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
