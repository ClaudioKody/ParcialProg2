{% extends 'base.html' %}
{% block title %}Datos del Comprador - FIFA 2026{% endblock %}
{% block section_title %}Compra de entrada{% endblock %}

{% block content %}
<div class="booking-container">
    <div class="booking-steps-bar">
        <div class="step-node active"><span class="step-number">✓</span></div>
        <div class="step-node active"><span class="step-number">✓</span></div>
        <div class="step-node active"><span class="step-number">3</span><span class="step-label">Datos del comprador</span></div>
        <div class="step-node"><span class="step-number">4</span></div>
        <div class="step-node"><span class="step-number">5</span></div>
    </div>

    <div class="booking-layout-grid" style="display: flex; gap: 30px; margin-top: 20px;">
        
        <div class="buyer-form-panel" style="flex: 1.5; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <h3>Datos del comprador</h3>
            <form action="{{ url_for('routes_compras.procesar_compra_final') }}" method="POST">
                
                <div class="seat-numbers-panel" style="margin-bottom: 20px;">
                    <label>Seleccioná tu asiento</label>
                    <select name="numero_asiento" required style="width: 100%; padding: 10px;">
                        <option value="104">Asiento 104 - Platea Baja</option>
                        <option value="105">Asiento 105 - Platea Baja</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label>Nombre</label>
                        <input type="text" name="nombre" placeholder="Ingresa tu nombre" style="width:100%; padding:8px;" required>
                    </div>
                    <div>
                        <label>Apellido</label>
                        <input type="text" name="apellido" placeholder="Ingresa tu apellido" style="width:100%; padding:8px;" required>
                    </div>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label>DNI / Pasaporte</label>
                    <input type="text" name="dni" placeholder="Ingresa tu DNI" style="width:100%; padding:8px;" required>
                </div>

                <div style="margin-bottom: 15px;">
                    <label>Nacionalidad</label>
                    <input type="text" name="nacionalidad" placeholder="Ej: Argentina" style="width:100%; padding:8px;" required>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label>Correo electrónico</label>
                    <input type="email" name="email" placeholder="Ingresa tu correo" style="width:100%; padding:8px;" required>
                </div>

                <button type="submit" class="btn-buy-ticket" style="width: 100%; border: none; cursor: pointer;">Continuar al pago</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
