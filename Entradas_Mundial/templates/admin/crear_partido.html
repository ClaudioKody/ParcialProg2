{% extends 'base.html' %}

{% block title %}Cargar Nuevo Partido - FIFA 2026{% endblock %}

{% block section_title %}Gestión de Partidos{% endblock %}

{% block content %}
<div class="dashboard-matches-container">
    <div class="matches-section-header">
        <h3>Cargar Nuevo Partido</h3>
    </div>

    <form action="{{ url_for('routes_partidos.crear_partido') }}" method="POST" style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="text" name="pais_local" placeholder="País Local" required class="matches-filter-select" style="width: 100%; margin-bottom: 10px; padding: 10px;">
            <input type="text" name="pais_visitante" placeholder="País Visitante" required class="matches-filter-select" style="width: 100%; margin-bottom: 10px; padding: 10px;">
            <input type="datetime-local" name="fecha_hora" required class="matches-filter-select" style="width: 100%; margin-bottom: 10px; padding: 10px;">
            <input type="text" name="estadio" placeholder="Estadio" required class="matches-filter-select" style="width: 100%; margin-bottom: 10px; padding: 10px;">
            <input type="text" name="ciudad" placeholder="Ciudad" required class="matches-filter-select" style="width: 100%; margin-bottom: 10px; padding: 10px;">
            <input type="number" step="0.01" name="precio_base" placeholder="Precio Base (USD)" required class="matches-filter-select" style="width: 100%; margin-bottom: 10px; padding: 10px;">
            <input type="number" name="capacidad" placeholder="Capacidad disponible" required class="matches-filter-select" style="width: 100%; margin-bottom: 10px; padding: 10px;">
        </div>
        <button type="submit" class="btn-buy-ticket" style="margin-top: 20px; cursor: pointer;">
            <i class="fa-solid fa-check"></i> Guardar Partido
        </button>
    </form>
</div>
{% endblock %}
