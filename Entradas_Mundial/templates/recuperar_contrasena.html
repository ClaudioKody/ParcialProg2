{% extends 'base.html' %}

{% block title %}Recuperar Contraseña - FIFA 2026{% endblock %}

{% block content %}
<div class="auth-bg-wrapper">
    <div class="auth-card">
        <div class="auth-body" style="text-align: center;">
            <h3 style="color: var(--azul-fifa-oscuro); font-weight: 700; margin-bottom: 10px;">¿Olvidaste tu contraseña?</h3>
            <p style="color: var(--texto-mutado); font-size: 14px; margin-bottom: 30px;">
                Ingresá tu correo electrónico para restablecer tu acceso.
            </p>

            <form action="{{ url_for('routes_auth.recuperar_password') }}" method="POST">
                <div class="form-group mb-3" style="text-align: left;">
                    <input type="email" name="email" class="form-control" placeholder="Correo electrónico registrado" required style="padding: 12px;">
                </div>
                
                <div class="form-group mb-3" style="text-align: left;">
                    <input type="password" name="nueva_password" class="form-control" placeholder="Nueva contraseña" required style="padding: 12px;">
                </div>

                <button type="submit" class="btn-buy-ticket" style="display: block; width: 100%; text-align: center; padding: 12px; border: none; margin-top: 20px;">
                    Restablecer Contraseña
                </button>
            </form>

            <div class="mt-4">
                <a href="{{ url_for('routes_auth.login') }}" style="color: var(--azul-fifa-medio); font-size: 13px; text-decoration: none; font-weight: bold;">
                    <i class="fa-solid fa-arrow-left"></i> Volver al Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
