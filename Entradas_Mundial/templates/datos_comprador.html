{% extends 'base.html' %}

{% block title %}Datos del Comprador - FIFA 2026{% endblock %}
{% block section_title %}Compra de entrada{% endblock %}

{% block content %}
<div class="booking-container">
    
    <div class="booking-steps-bar">
        <div class="step-node active"><span class="step-number">✓</span></div>
        <div class="step-node active"><span class="step-number">✓</span></div>
        <div class="step-node active"><span class="step-number">3</span><span class="step-label">Datos del comprador</span></div>
        <div class="step-node"><span class="step-number">4</span></div>
        <div class="step-node"><span class="step-number">5</span></div>
    </div>

    <div class="booking-layout-grid" style="display: flex; gap: 30px; margin-top: 20px;">
        
        <div class="seat-numbers-panel" style="flex: 1.2; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <h3>Seleccioná tu zona y luego tu asiento</h3>
            <select style="width: 100%; padding: 10px; margin-bottom: 20px;">
                <option>Platea Baja</option>
            </select>

            <p>Seleccioná tu asiento:</p>
            <div class="seats-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px;">
                <button style="padding: 10px; background: #003399; color: white; border: none; border-radius: 4px; cursor: pointer;">104</button>
                <button style="padding: 10px; background: #eee; border: none; border-radius: 4px;">105</button>
                <button style="padding: 10px; background: #eee; border: none; border-radius: 4px;">106</button>
                <button style="padding: 10px; background: #eee; border: none; border-radius: 4px;">107</button>
                <button style="padding: 10px; background: #ddd; border: none; border-radius: 4px;" disabled>108 (X)</button>
            </div>
        </div>

        
        <div class="buyer-form-panel" style="flex: 1.5; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <h3>Datos del comprador</h3>
            <form action="{{ url_for('routes_partidos.pago') }}" method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="display:block; margin-bottom:5px;">Nombre</label>
                        <input type="text" placeholder="Ingresa tu nombre" style="width:100%; padding:8px;" required>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:5px;">Apellido</label>
                        <input type="text" placeholder="Ingresa tu apellido" style="width:100%; padding:8px;" required>
                    </div>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">DNI / Pasaporte</label>
                    <input type="text" placeholder="Ingresa tu DNI" style="width:100%; padding:8px;" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:5px;">Correo electrónico</label>
                    <input type="email" placeholder="Ingresa tu correo" style="width:100%; padding:8px;" required>
                </div>

                <button type="submit" class="btn-buy-ticket" style="width: 100%;">Continuar al pago</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
