<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIFA World Cup 2026™ Tickets{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            color: #111;
        }
        /* Paleta Oficial FIFA 2026 Innovadora */
        .bg-mundial-dark { background-color: #0b2240; } /* Azul Noche */
        .bg-mundial-green { background-color: #00a86b; } /* Verde Esmeralda Vivo */
        .text-mundial-gold { color: #ffcc00; } /* Oro FIFA */
        
        .navbar-mundial {
            background: linear-gradient(135deg, #0b2240 0%, #051326 100%);
            border-bottom: 4px solid #00a86b;
        }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .nav-link {
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .nav-link:hover {
            color: #ffcc00 !important;
        }
        /* Botón Innovador */
        .btn-mundial {
            background-color: #00a86b;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-mundial:hover {
            background-color: #ffcc00;
            color: #0b2240;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }
        .card-custom {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-mundial sticky-top shadow">
        <div class="container">
            <a class="navbar-brand text-white" href="/partidos">
                🏆 FIFA <span class="text-mundial-gold">2026</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="/partidos"><i class="bi bi-calendar3"></i> Partidos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white px-3" href="/login"><i class="bi bi-box-arrow-in-right"></i> Ingresar</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-mundial px-4 py-2 mt-2 mt-lg-0" href="/registro">Registrarse</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="bg-mundial-dark text-white text-center py-4 mt-auto border-top border-secondary">
        <p class="mb-0 small opacity-75">© 2026 - Proyecto de Cátedra Programación II. IES 9-023. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
